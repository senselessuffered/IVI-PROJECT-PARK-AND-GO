<div class="panel d-none d-md-block" id="all-spots">
    <table class="table table-bookings align-middle">
        <thead>
            <tr>
                <th>Место</th>
                <th>Описание</th>
                <th>Статус</th>
                <th class="text-center">Действие</th>
            </tr>
        </thead>
        <tbody>
        {% for spot in spots %}
        <tr id="spot-{{ spot.number }}" class="spot-row">
            <td class="cell-spot">{{ spot.number }}</td>
            <td>{{ spot.description|default:"—" }}</td>
            <td>
                {% include 'spots/includes/_status_badge.html' with spot=spot only %}
            </td>
            <td class="text-center">
                {% if spot.is_active %}
                <a href="{% url 'bookings:create' %}?spot={{ spot.id }}" class="btn btn-sm btn-outline-primary action-btn">
                    Забронировать
                </a>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
