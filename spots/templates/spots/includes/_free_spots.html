<div class="free-spots-section">
    <h2 class="free-spots-title">
        Свободные места
        <span class="free-count-badge">
            <span class="status-dot {% if free_spots_count > 0 %}status-dot-active{% else %}status-dot-inactive{% endif %}"></span>
            <span class="free-count-number {% if free_spots_count > 0 %}free-count-green{% else %}free-count-red{% endif %}">
                {{ free_spots_count }}
            </span>
        </span>
    </h2>

    {% if free_spots_count > 0 %}
    <div class="free-spots-grid">
        {% for spot in free_spots|slice:":5" %}
        <div class="free-spot-card" onclick="scrollToSpot('{{ spot.number }}')">
            <div class="free-spot-number">{{ spot.number }}</div>
            <div class="free-spot-desc">{{ spot.description|default:"—" }}</div>
            <a href="{% url 'bookings:create' %}?spot={{ spot.id }}" class="btn btn-sm btn-outline-primary book-btn">
                Забронировать
            </a>
        </div>
        {% endfor %}
    </div>
    <div class="text-center mt-3">
        <a href="#all-spots" class="btn btn-outline-primary btn-sm">Показать все места</a>
    </div>
    {% else %}
    <div class="no-free-spots">
        К сожалению, все места заняты
    </div>
    {% endif %}
</div>
