<script>
function scrollToSpot(spotNumber) {
    var target = document.getElementById('spot-' + spotNumber);
    if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.classList.add('highlight-spot');
        setTimeout(function() {
            target.classList.remove('highlight-spot');
        }, 1200);
    }
}
</script>
