services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: parkandgo
      POSTGRES_USER: parkandgo
      POSTGRES_PASSWORD: parkandgo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkandgo -d parkandgo"]
      interval: 5s
      timeout: 5s
      retries: 10

  maildev:
    image: maildev/maildev
    ports:
      - "1080:1080"

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: django-insecure-dev-only-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: 127.0.0.1,localhost,0.0.0.0,web
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: parkandgo
      DB_USER: parkandgo
      DB_PASSWORD: parkandgo
      DB_HOST: db
      DB_PORT: "5432"
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: maildev
      EMAIL_PORT: "1025"
      EMAIL_USE_TLS: "False"
      DEFAULT_FROM_EMAIL: noreply@parkandgo.local
    depends_on:
      db:
        condition: service_healthy
      maildev:
        condition: service_started

volumes:
  postgres_data:
