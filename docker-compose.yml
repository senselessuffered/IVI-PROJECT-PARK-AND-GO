services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: parkandgo
      POSTGRES_USER: parkandgo
      POSTGRES_PASSWORD: parkandgo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkandgo -d parkandgo"]
      interval: 5s
      timeout: 5s
      retries: 10

  maildev:
    image: maildev/maildev
    ports:
      - "1080:1080"

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      maildev:
        condition: service_started

volumes:
  postgres_data:
